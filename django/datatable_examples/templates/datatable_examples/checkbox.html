<div class="w-100 float-left">
    <div class="form-check float-left">
        <label class="form-check-label small">
            <input data-value="{{ data_value }}" type="checkbox" class="form-check-input filtercheck" checked>{{ text }}
        </label>
    </div>
    <span data-value="{{ data_value }}" class="small badge badge-pill badge-primary float-right">-</span>
</div>

version: "3"
services:

 django:
  build:
   context: ./
  volumes:
   - ./django/:/app
   - ./django_datatables/:/dt/django_datatables
  command: bash -c "python manage.py migrate && python manage.py import_data && python manage.py runserver 0.0.0.0:8006"
  environment:
   - PYTHONPATH=/dt
  ports:
   - 8006:8006




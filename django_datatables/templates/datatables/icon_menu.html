{% spaceless %}
<div>
    {% for value in menu.visible_items %}
        {% if value.default_render %}
            <a href="{{ value.href }}"
               class="{{ value.css|default:"btn-primary" }}" {{ value.attributes }}>
            <span> {{ value.name }}{{ value.badge }}</span>
            </a>
        {% else %}
            {{ value.render }}
        {% endif %}
    {% endfor %}
</div>
{% endspaceless %}
